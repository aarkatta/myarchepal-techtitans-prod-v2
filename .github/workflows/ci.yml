name: CI — Frontend

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "tsconfig*.json"
      - "vite.config.ts"
      - "package.json"
      - "package-lock.json"
  pull_request:
    paths:
      - "src/**"
      - "tsconfig*.json"
      - "vite.config.ts"
      - "package.json"
      - "package-lock.json"

jobs:
  typecheck-lint:
    name: Type-check · Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type-check
        run: npx tsc --noEmit

      - name: ESLint
        run: npm run lint
